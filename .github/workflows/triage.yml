name: Triage

on:
  push:
    branches: ["main"]
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  schedule:
    - cron: "0 10 * * *"   # Daily at 10:00 UTC

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  # ── Merge conflict labeling ───────────────────────────────────────────────
  # Runs after every push to main and labels any open PRs that now conflict.
  label-merge-conflicts:
    name: Label merge conflicts
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: eps1lon/actions-label-merge-conflict@v3
        with:
          dirtyLabel: "Has Conflicts"
          repoToken: ${{ secrets.GITHUB_TOKEN }}

  # ── Duplicate detection ───────────────────────────────────────────────────
  # Checks newly opened or edited issues for similarity against existing ones.
  # Applies "Potential Duplicate" label and comments with matching issues.
  detect-duplicates:
    name: Detect duplicate issues
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: wow-actions/potential-duplicates@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          label: "Potential Duplicate"
          threshold: 0.6

  # ── Stale Question issues ─────────────────────────────────────────────────
  # Runs daily at 10:00 UTC or when a comment contains /check-stale.
  # Warns and closes "Type: Question" issues with no activity for 30 days.
  stale-questions:
    name: Flag stale Question issues
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '/check-stale'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          only-labels: "Type: Question"
          days-before-stale: 30
          days-before-close: 0
          stale-issue-label: "Stale"
          stale-issue-message: >
            This question has had no activity for 30 days and will be closed.
            Comment to keep it open, or reopen it if still relevant.
          close-issue-message: >
            Closing due to 30 days of inactivity. Feel free to reopen if still relevant.
          operations-per-run: 100

  # ── General inactivity closure ────────────────────────────────────────────
  # Runs daily. Closes any issue inactive for 30 days, except those explicitly
  # marked Status: Pending or Type: Bug (actively tracked work).
  close-inactive:
    name: Close inactive issues
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          exempt-issue-labels: "Status: Pending,Type: Bug"
          days-before-stale: 30
          days-before-close: 0
          stale-issue-label: "Stale"
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed.
            Please comment to keep it open.
          close-issue-message: >
            Closing due to 30 days of inactivity. Reopen if still relevant.
          operations-per-run: 100
