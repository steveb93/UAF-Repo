name: Build uaf-neo4j-plugin
on:
  push:
    branches: ["main", "preview"]
    tags: ["v*"]      #/Example: v1.0.0 from main, v0.2.0-Preview from preview
  pull_request:
    branches: ["main", "preview"]
    paths:
      - "uaf-neo4j-plugin/**"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uaf-neo4j-plugin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so `git branch --contains` can see remote branches
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven
          cache-dependency-path: uaf-neo4j-plugin/pom.xml
      - name: Install API jars
        shell: pwsh
        run: ./install-msosa-jars.ps1

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "revision=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "revision=0.2.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Plugin
        run: mvn clean package -Drevision=${{ steps.version.outputs.revision }}
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4
        with:
          directory: uaf-neo4j-plugin

      - name: Verify tag is on the correct branch
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-Preview ]]; then
            EXPECTED="origin/preview"
          else
            EXPECTED="origin/main"
          fi
          if git branch -r --contains "${GITHUB_SHA}" | grep -qE "^[[:space:]]*${EXPECTED}[[:space:]]*$"; then
            echo "Tag ${GITHUB_REF_NAME} verified on ${EXPECTED}"
          else
            echo "::error::Tag ${GITHUB_REF_NAME} is not on ${EXPECTED}. Preview tags must come from 'preview', release tags from 'main'."
            exit 1
          fi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            uaf-neo4j-plugin/target/uaf-neo4j-plugin-*-plugin.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-Preview') }}
