name: Build uaf-neo4j-plugin with Maven

on:
  push:
    branches: ["main"]
    tags: ["v*"]      #/Example git tag v1.0.0 | git push main v1.0.0
  pull_request:
      branches: ["main"]
      paths:
        - "uaf-neo4j-plugin/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: uaf-neo4j-plugin

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven
          cache-dependency-path: uaf-neo4j-plugin/pom.xml

      - name: Install API jars
        shell: pwsh
        run: ./install-msosa-jars.ps1
        
      - name: Build Plugin
        run: mvn clean package

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4
        with:
          directory: uaf-neo4j-plugin

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            uaf-neo4j-plugin/target/uaf-neo4j-plugin-*-plugin.zip
          generate_release_notes: true
