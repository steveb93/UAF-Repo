services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j-docker
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
      - "7473:7473"
    environment:
      - NEO4J_AUTH=neo4j/Password123
      - NEO4J_PLUGINS=["apoc","apoc-extended", "bloom", "graph-data-science", "genai"]
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - F:/neo4j-docker/data:/data
      - F:/neo4j-docker/logs:/logs
      - F:/neo4j-docker/import:/import
      - F:/neo4j-docker/plugins:/plugins

  devcontainer:
    image: mcr.microsoft.com/devcontainers/python:3.12
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    depends_on:
      - neo4j
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=Password123