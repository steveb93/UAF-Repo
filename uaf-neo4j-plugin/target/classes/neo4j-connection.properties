# UAF Neo4j Plugin — Connection Configuration
# This file is loaded from the plugin directory at MSOSA startup.
# Changes take effect after saving via the Configure dialog or restarting MSOSA.

# Bolt URI of the Neo4j instance (Docker container on localhost)
neo4j.uri=bolt://localhost:7687

# Database credentials
neo4j.user=neo4j
neo4j.password=Password123

# Target database (use "neo4j" for the default database)
neo4j.database=neo4j

# Number of nodes/relationships written per transaction batch.
# Increase for large models; decrease if you see timeout errors.
neo4j.batch.size=500

# Connection pool max size (advanced)
neo4j.max.connections=10
